<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harish | Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            text-align: center;
            padding: 40px;
        }
        h1 {
            font-size: 4rem;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .tagline {
            font-size: 1.5rem;
            color: #a0a0a0;
            margin-bottom: 30px;
        }
        .info {
            font-size: 1.1rem;
            line-height: 2;
            color: #d0d0d0;
        }
        .info a {
            color: #00d4ff;
            text-decoration: none;
        }
        .info a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Harish</h1>
        <p class="tagline">Software Developer</p>
        <div class="info">
            <p>📍 India</p>
            <p>📧 gurramharish275@gmail.com</p>
            <p>💻 <a href="https://github.com/Harish111" target="_blank">GitHub</a></p>
        </div>
    </div>
</body>
</html>
