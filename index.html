<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Harish Gurram | Portfolio</title>
  <meta name="description" content="Harish Gurram — Software Developer. Drive around an interactive low-poly Japan to explore my work." />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <!-- Loading overlay -->
  <div id="loading">
    <div class="loading-inner">
      <h1>Harish&nbsp;Gurram</h1>
      <p class="loading-tag">Loading the world…</p>
      <div class="loading-bar"><div class="loading-fill"></div></div>
    </div>
  </div>

  <!-- Intro / controls hint -->
  <div id="hud">
    <div class="hud-help">
      <strong>Drive:</strong> W A S D · <strong>or</strong> Arrow keys
    </div>
  </div>

  <!-- Music toggle -->
  <button id="sound-btn" aria-label="Toggle music">🔈 Music</button>

  <!-- Content panel (shown when you reach a zone) -->
  <div id="panel" class="hidden">
    <button id="panel-close" aria-label="Close">×</button>
    <div id="panel-content"></div>
  </div>

  <!-- On-screen touch controls (mobile) -->
  <div id="touch" class="hidden">
    <div class="touch-row">
      <button class="tbtn" data-key="up">▲</button>
    </div>
    <div class="touch-row">
      <button class="tbtn" data-key="left">◀</button>
      <button class="tbtn" data-key="down">▼</button>
      <button class="tbtn" data-key="right">▶</button>
    </div>
  </div>

  <canvas id="scene"></canvas>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
